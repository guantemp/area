<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <!-- 你需要Material图标吗？-->
    <link href="https://fonts.googleapis.com/css?family=Roboto:100,300,400,500,700,900|Material+Icons" rel="stylesheet"
          type="text/css">

    <!-- 你需要Fontawesome吗？ -->
    <link href="https://use.fontawesome.com/releases/v5.0.13/css/all.css" rel="stylesheet">

    <!-- 你需要Ionicons吗？ -->
    <link href="https://cdn.jsdelivr.net/npm/ionicons@^4.0.0/dist/css/ionicons.min.css" rel="stylesheet">

    <!-- 你需要MDI吗？ -->
    <link href="https://cdn.jsdelivr.net/npm/@mdi/font@^3.0.0/css/materialdesignicons.min.css" rel="stylesheet">

    <!-- 你需要所有的动画吗？ -->
    <link href="https://cdn.jsdelivr.net/npm/animate.css@^3.5.2/animate.min.css" rel="stylesheet">

    <!--
      最后，添加Quasar的CSS：
      将所需版本的Quasar替换以下版本（1.0.0）。
      为RTL支持添加“.rtl”（例如：quasar.rtl.min.css）。
    -->
    <link href="https://cdn.jsdelivr.net/npm/quasar@^1.5.3/dist/quasar.min.css" rel="stylesheet" type="text/css">
</head>
<body>
<div id="q-app">
    <input class="q-pa-md" style="max-width: 550px">
    <q-uploader
            accept="application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"
            label="选择区域数据文件"
            url="http://localhost:8080/area/v1/batch"
    >
    </q-uploader>
</div>
</div>
<div>
    <a href="http://localhost:8080/area/v1/batch">上传测试</a>
    <form action="http://localhost:8080/area/v1/batch" enctype="multipart/form-data" method="POST">
        File to upload: <input name="upfile" type="file"><br/>
        <input type="submit" value="Press"> to upload the file!
    </form>
</div>

<!--你想要IE支持吗？ 用您想要的Quasar版本替换“1.0.0” -->
<script src="https://cdn.jsdelivr.net/npm/quasar@^1.5.3/dist/quasar.ie.polyfills.umd.min.js"></script>

<!-- 你也需要Vue -->
<script src="https://cdn.jsdelivr.net/npm/vue@2.6.11/dist/vue.min.js"></script>

<!--
  添加Quasar的JS：
  将所需版本的Quasar替换以下版本（1.0.0）。
-->
<script src="https://cdn.jsdelivr.net/npm/quasar@^1.5.3/dist/quasar.umd.min.js"></script>

<!--
  如果要添加Quasar语言包（“en-us”除外）。
  注意巴西葡萄牙语语言包“i18n.pt-br.umd.min.js”中的“pt-br”。
  将所需版本的Quasar替换以下版本（1.0.0）。
  同时检查下面的最终<script>标签以启用该语言
  语言包列表： https://github.com/quasarframework/quasar/tree/dev/ui/lang
-->
<script src="https://cdn.jsdelivr.net/npm/quasar@^1.5.3/dist/lang/zh-hans.umd.min.js"></script>

<!--
  如果您想制作Quasar组件（不是您自己的），请使用一组特定的图标（除非您已经使用了Material图标）。
  将所需版本的Quasar替换以下版本（1.0.0）。
  图标集列表： https://github.com/quasarframework/quasar/tree/dev/ui/icon-set
-->
<script src="https://cdn.jsdelivr.net/npm/quasar@@^1.5.3/dist/icon-set/fontawesome-v5.umd.min.js"></script>

<script>
    // 如果使用Quasar语言包而不是默认的“en-us”;
    // 需要上面的语言包样式标记
    Quasar.lang.set(Quasar.lang.zhHans) // notice camel-case "zhHans"

    // 如果您希望Quasar组件使用特定的图标库
    // 而不是默认的Material图标
    // 需要上面的图标设置样式标记
    Quasar.iconSet.set(Quasar.iconSet.fontawesomeV5) // fontawesomeV5 is just an example

    /*
      开启UI的示例。
      显然，根据您的具体需求进行调整。
     */
    Vue.component('my-page', {
        template: '#my-page'
    })

    // 启动UI, 假设您的<body>中有<div id="my-page"></div>
    new Vue({
        el: '#q-app',
        data: function () {
            return {
                version: Quasar.version,
                drawerState: true
            }
        }
    })

</script>
</body>

</html>
